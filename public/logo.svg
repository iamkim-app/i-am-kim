<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="redFill" x1="72" y1="48" x2="186" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF9AA2"></stop>
      <stop offset="0.42" stop-color="#F36B74"></stop>
      <stop offset="1" stop-color="#E5484D"></stop>
    </linearGradient>

    <linearGradient id="blueFill" x1="74" y1="108" x2="190" y2="214" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8BB8FF"></stop>
      <stop offset="0.42" stop-color="#4E86F8"></stop>
      <stop offset="1" stop-color="#2563EB"></stop>
    </linearGradient>

    <clipPath id="markClip">
      <circle cx="128" cy="128" r="92"></circle>
