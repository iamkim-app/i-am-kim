  <!-- top red -->
  <path fill="url(#redFill)" transform="rotate(-90 128 128)" d="M128 36
       A92 92 0 0 1 128 220
       A46 46 0 0 0 128 128
       A46 46 0 0 1 128 36Z"></path>

  <!-- bottom blue -->
  <path fill="url(#blueFill)" transform="rotate(90 128 128)" d="M128 36
       A92 92 0 0 1 128 220
       A46 46 0 0 0 128 128
       A46 46 0 0 1 128 36Z"></path>

  <!-- subtle premium highlight -->
  <g clip-path="url(#markClip)">
    <ellipse cx="94" cy="82" rx="58" ry="26" transform="rotate(-18 94 82)" fill="white" opacity="0.20"></ellipse>
    <ellipse cx="166" cy="176" rx="50" ry="22" transform="rotate(14 166 176)" fill="white" opacity="0.10"></ellipse>
  </g>
</svg>